<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>視障按摩預約 — 員工預約</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --primary:#1a5276;--primary-light:#2980b9;--primary-pale:#d6eaf8;
  --success:#1e8449;--success-light:#27ae60;--success-pale:#d5f5e3;
  --warning:#b7770d;--warning-pale:#fef9e7;
  --danger:#c0392b;--danger-pale:#fadbd8;
  --gray-50:#f8f9fa;--gray-100:#f1f2f4;--gray-200:#e2e5e9;
  --gray-300:#c8cdd4;--gray-400:#9aa3ae;--gray-600:#4a5568;--gray-700:#2d3748;--gray-900:#1a202c;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 12px rgba(0,0,0,.1);--shadow-lg:0 8px 24px rgba(0,0,0,.15);
  --radius:10px;--radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:#f0f4f8;color:var(--gray-900);min-height:100vh}

/* HEADER */
.header{background:var(--primary);color:white;padding:0 32px;height:60px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-md);position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:500}
.header-right{display:flex;align-items:center;gap:14px;font-size:14px}
.header-right span{opacity:.85}
.btn-logout{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;padding:6px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-family:inherit}
.btn-logout:hover{background:rgba(255,255,255,.25)}

/* NAV */
.nav{background:white;border-bottom:1px solid var(--gray-200);display:flex;padding:0 32px;gap:4px;overflow-x:auto}
.nav-tab{padding:14px 20px;font-size:14px;font-weight:500;color:var(--gray-400);cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.nav-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.nav-tab:hover:not(.active){color:var(--gray-600)}

/* BODY */
.body{padding:32px;max-width:1100px;margin:0 auto}
.tab{display:none}.tab.active{display:block}

/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.cal-title{font-size:22px;font-weight:600;color:var(--gray-700)}
.cal-nav{display:flex;align-items:center;gap:8px}
.cal-btn{width:36px;height:36px;background:white;border:1.5px solid var(--gray-200);border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-btn:hover:not(:disabled){background:var(--primary-pale);border-color:var(--primary-light)}
.cal-btn:disabled{opacity:.3;cursor:not-allowed}
.cal-month{font-size:15px;font-weight:500;min-width:90px;text-align:center;color:var(--gray-700)}
.cal-grid{background:white;border-radius:var(--radius-lg);border:1px solid var(--gray-200);box-shadow:var(--shadow-sm);overflow:hidden}
.cal-wdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--primary)}
.cal-wday{padding:12px;text-align:center;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);letter-spacing:.5px}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-day{min-height:92px;padding:10px 8px;border-right:1px solid var(--gray-100);border-bottom:1px solid var(--gray-100);cursor:default;transition:background .15s;position:relative}
.cal-day:nth-child(7n){border-right:none}
.day-num{font-size:13px;font-weight:500;color:var(--gray-400);margin-bottom:5px}
.cal-day.other .day-num{color:var(--gray-200)}
.cal-day.open-day .day-num{color:var(--primary);font-weight:600}
.cal-day.today .day-num{background:var(--primary);color:white;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cal-day.clickable{cursor:pointer}.cal-day.clickable:hover{background:#f0f7ff}
.cal-day.past{opacity:.45;pointer-events:none}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 8px;border-radius:20px;margin-top:4px;line-height:1.3}
.badge.avail{background:var(--success-pale);color:var(--success)}
.badge.full{background:var(--danger-pale);color:var(--danger)}
.badge.mine{background:var(--primary-pale);color:var(--primary)}
.badge.month-used{background:#fff3cd;color:#856404}
.badge.blocked{background:#f3f4f6;color:var(--gray-400);font-size:10px;white-space:normal}

/* SLOT MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:white;border-radius:var(--radius-lg);width:500px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:mIn .2s ease}
@keyframes mIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-head{padding:20px 24px 16px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:17px;font-weight:600;color:var(--gray-700)}
.modal-close{width:32px;height:32px;background:var(--gray-100);border:none;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--gray-200)}
.modal-body{padding:20px 24px}
.modal-foot{padding:14px 24px;border-top:1px solid var(--gray-100);font-size:13px;color:var(--gray-400)}
.notice{background:var(--warning-pale);border:1px solid #f0c060;border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--warning);margin-bottom:14px;display:none}
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.slot{padding:12px 8px;border:1.5px solid var(--gray-200);border-radius:var(--radius);background:white;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;text-align:center;transition:all .2s;color:var(--gray-700)}
.slot:hover:not(.taken):not(.mine-slot){border-color:var(--primary-light);background:var(--primary-pale);color:var(--primary)}
.slot.taken{background:var(--gray-50);color:var(--gray-300);cursor:not-allowed}
.slot.mine-slot{background:var(--primary-pale);border-color:var(--primary);color:var(--primary);cursor:default}

/* CONFIRM MODAL */
.confirm-modal{background:white;border-radius:var(--radius-lg);width:400px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:mIn .2s ease;padding:32px}
.confirm-modal h3{font-size:18px;font-weight:600;color:var(--gray-700);margin-bottom:12px;text-align:center}
.confirm-modal p{font-size:14px;color:var(--gray-600);line-height:1.7;text-align:center}
.confirm-btns{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.btn-yes{padding:10px 28px;background:var(--primary);color:white;border:none;border-radius:var(--radius);font-size:14px;font-family:inherit;cursor:pointer}
.btn-no{padding:10px 28px;background:white;color:var(--gray-600);border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:14px;font-family:inherit;cursor:pointer}
.btn-red{padding:10px 28px;background:var(--danger-pale);color:var(--danger);border:1.5px solid #f0b0b0;border-radius:var(--radius);font-size:14px;font-family:inherit;cursor:pointer}

/* MY BOOKINGS */
.section-title{font-size:18px;font-weight:600;color:var(--gray-700);margin-bottom:20px;display:flex;align-items:center;gap:10px}
.bk-list{display:flex;flex-direction:column;gap:12px}
.bk-card{background:white;border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow-sm)}
.bk-date{font-size:16px;font-weight:600;color:var(--gray-700);margin-bottom:4px}
.bk-time{font-size:14px;color:var(--primary);font-weight:500}
.bk-status{font-size:12px;padding:4px 12px;border-radius:20px;font-weight:500;white-space:nowrap}
.bk-status.upcoming{background:var(--success-pale);color:var(--success)}
.bk-status.past{background:var(--gray-100);color:var(--gray-400)}
.btn-cancel{background:none;border:1.5px solid var(--danger-pale);color:var(--danger);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;margin-left:10px}
.btn-cancel:hover{background:var(--danger-pale)}
.empty{text-align:center;padding:56px 32px;color:var(--gray-400)}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty p{font-size:14px;line-height:1.6}

/* PASSWORD */
.pw-card{background:white;border-radius:var(--radius-lg);padding:32px;max-width:460px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200)}
.pw-card h3{font-size:17px;font-weight:600;margin-bottom:24px;color:var(--gray-700)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:7px}
.form-group input{width:100%;padding:12px 16px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:15px;font-family:inherit;outline:none;color:var(--gray-900)}
.form-group input:focus{border-color:var(--primary-light)}
.btn-save{padding:12px 28px;background:var(--primary);color:white;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer}
.btn-save:hover{background:var(--primary-light)}
.err{background:var(--danger-pale);color:var(--danger);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:10px;display:none}
.err.show{display:block}
.suc{background:var(--success-pale);color:var(--success);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:10px;display:none}
.suc.show{display:block}

/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.8);z-index:999;display:none;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#loading-overlay.show{display:flex}
.spinner{width:38px;height:38px;border:3px solid var(--gray-200);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toasts{position:fixed;top:80px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:white;border-radius:var(--radius);padding:14px 18px;font-size:14px;box-shadow:var(--shadow-lg);border-left:4px solid var(--success);max-width:320px;animation:tIn .3s ease;pointer-events:auto}
.toast.err-toast{border-left-color:var(--danger)}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* LEGEND */
.legend{margin-top:16px;font-size:13px;color:var(--gray-400);display:flex;gap:16px;flex-wrap:wrap}

@media(max-width:700px){
  .body{padding:16px}
  .header{padding:0 16px}
  .nav{padding:0 8px}
  .slots{grid-template-columns:repeat(2,1fr)}
  .bk-card{flex-direction:column;align-items:flex-start;gap:10px}
}
</style>
</head>
<body>
<div id="loading-overlay"><div class="spinner"></div><span style="font-size:14px;color:var(--gray-600)">處理中…</span></div>
<div class="toasts" id="toasts"></div>

<header class="header">
  <div class="header-brand"><span>🤲</span><span>視障按摩預約</span></div>
  <div class="header-right">
    <span id="hdr-name"></span>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>
</header>

<nav class="nav">
  <div class="nav-tab active" onclick="switchTab(event,'calendar')">📅 預約行事曆</div>
  <div class="nav-tab" onclick="switchTab(event,'bookings')">📋 我的預約</div>
  <div class="nav-tab" onclick="switchTab(event,'password')">🔒 更改密碼</div>
</nav>

<div class="body">
  <!-- 行事曆 -->
  <div class="tab active" id="tab-calendar">
    <div class="cal-header">
      <div class="cal-title" id="cal-title"></div>
      <div class="cal-nav">
        <button class="cal-btn" id="btn-prev" onclick="prevMonth()">‹</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="cal-btn" id="btn-next" onclick="nextMonth()">›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-wdays" id="cal-wdays"></div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div class="legend">
      <span>💚 尚有名額</span><span>🔴 額滿</span><span>🔵 已預約</span><span>⛔ 不開放</span>
      <span style="color:var(--primary);font-weight:500" id="limit-hint">可預約範圍：當月起 3 個月</span>
    </div>
  </div>

  <!-- 我的預約 -->
  <div class="tab" id="tab-bookings">
    <div class="section-title"><span>📋</span>我的預約紀錄</div>
    <div class="bk-list" id="bk-list"></div>
  </div>

  <!-- 更改密碼 -->
  <div class="tab" id="tab-password">
    <div class="section-title"><span>🔒</span>更改密碼</div>
    <div class="pw-card">
      <h3>設定新密碼</h3>
      <div class="form-group"><label>目前密碼</label><input type="password" id="pw-cur" placeholder="請輸入目前密碼"></div>
      <div class="form-group"><label>新密碼（至少6碼）</label><input type="password" id="pw-new" placeholder="請輸入新密碼"></div>
      <div class="form-group"><label>確認新密碼</label><input type="password" id="pw-cf" placeholder="請再次輸入新密碼"></div>
      <button class="btn-save" onclick="changePw()">確認更改</button>
      <div class="err" id="pw-err"></div>
      <div class="suc" id="pw-suc">密碼更改成功！</div>
    </div>
  </div>
</div>

<!-- 選時段 Modal -->
<div class="overlay" id="slot-overlay">
  <div class="modal">
    <div class="modal-head">
      <h3>選擇按摩時段</h3>
      <button class="modal-close" onclick="closeOverlay('slot-overlay')">×</button>
    </div>
    <div class="modal-body">
      <p style="font-size:15px;color:var(--gray-600);margin-bottom:14px">📅 預約日期：<strong id="slot-date-label" style="color:var(--primary)"></strong></p>
      <div class="notice" id="slot-notice">⚠️ 您本月已有預約，同月份每人限一個時段。如需更改請先取消現有預約。</div>
      <div class="slots" id="slots-grid"></div>
    </div>
    <div class="modal-foot">✅ 可預約　✗ 已被預約　🔵 您的預約</div>
  </div>
</div>

<!-- 確認 Modal -->
<div class="overlay" id="confirm-overlay">
  <div class="confirm-modal">
    <h3 id="cf-title"></h3>
    <p id="cf-msg"></p>
    <div class="confirm-btns" id="cf-btns"></div>
  </div>
</div>

<script>
const API_KEY='mas_api_url';
const TIME_SLOTS=['10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','16:00','16:30','17:00','17:30'];
const WD=['日','一','二','三','四','五','六'];
const MONTH_NAMES=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];

let emp=null, calData={myBookings:[],occupancy:{},blocked:[],settings:{openDays:[3]}};
let viewDate=new Date(), openDays=[3];

// ── 工具 ──────────────────────────────────────────
function getAPI(){return 'https://script.google.com/macros/s/AKfycby89Fz2I2LPL_R9DjP6IJpn3SVh4TIA6PntbZVmmv-MhB-t4o1Zkctnztvr_I1R3CIq/exec';}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function parseLocalDate(s){if(!s)return new Date(NaN);const[y,m,d]=String(s).slice(0,10).split('-').map(Number);return new Date(y,m-1,d)}

function cleanDate(raw){
  if(!raw)return'';
  const s=String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(s.includes('T')){
    // Has timezone Z → convert to local date
    if(s.endsWith('Z')||s.includes('+')){
      const d=new Date(s);
      return fmtDate(d);
    }
    return s.slice(0,10);
  }
  try{return fmtDate(new Date(s))}catch(e){return s}
}

function cleanTime(raw){
  if(!raw)return'';
  const s=String(raw).trim();
  if(/^\d{1,2}:\d{2}$/.test(s))return s.padStart(5,'0');
  if(/^\d{1,2}:\d{2}:\d{2}$/.test(s))return s.slice(0,5);
  if(s.includes('T')){const d=new Date(s);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
  return s;
}

function addMins(t,m){
  const c=cleanTime(t);if(!c.includes(':'))return'';
  const[h,mn]=c.split(':').map(Number),tot=h*60+mn+m;
  return String(Math.floor(tot/60)).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');
}

function loading(v){document.getElementById('loading-overlay').classList.toggle('show',v)}

function toast(msg,isErr){
  const t=document.createElement('div');
  t.className='toast'+(isErr?' err-toast':'');
  t.textContent=msg;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>t.remove(),4000);
}

function closeOverlay(id){document.getElementById(id).classList.remove('open')}

function showConfirm(title,msg,buttons){
  document.getElementById('cf-title').textContent=title;
  document.getElementById('cf-msg').innerHTML=msg;
  const btns=document.getElementById('cf-btns');btns.innerHTML='';
  buttons.forEach(b=>{
    const el=document.createElement('button');
    el.className=b.cls;el.textContent=b.label;
    el.onclick=()=>{closeOverlay('confirm-overlay');b.action()};
    btns.appendChild(el);
  });
  document.getElementById('confirm-overlay').classList.add('open');
}

async function api(data){
  const url=getAPI();if(!url)throw new Error('未設定API');
  const r=await fetch(url,{method:'POST',redirect:'follow',body:JSON.stringify(data)});
  return r.json();
}

// ── 初始化 ────────────────────────────────────────
async function init(){
  emp=JSON.parse(sessionStorage.getItem('emp')||'null');
  if(!emp){location.href='index.html';return}
  // Force string to preserve leading zeros
  if(emp) emp.id=String(emp.id);
  document.getElementById('hdr-name').textContent=`${emp.name}（${emp.id}）`;
  await loadCalData();
}

async function loadCalData(){
  loading(true);
  try{
    const r=await api({action:'getBookings',empId:emp.id});
    if(r.ok){
      r.myBookings=(r.myBookings||[]).map(b=>({...b,date:cleanDate(b.date),time:cleanTime(b.time)}));
      const occ={};
      Object.entries(r.occupancy||{}).forEach(([k,v])=>{
        occ[cleanDate(k)]=(v||[]).map(t=>cleanTime(t));
      });
      r.occupancy=occ;
      r.blocked=(r.blocked||[]).map(b=>({...b,date:cleanDate(b.date)}));
      calData=r;
      openDays=(r.settings&&r.settings.openDays)||[3];
    }
  }catch(e){}
  loading(false);
  renderWdays();renderCal();
}

function logout(){
  sessionStorage.removeItem('emp');
  location.href='index.html';
}

// ── 頁籤切換 ──────────────────────────────────────
function switchTab(e,id){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
  if(id==='bookings')renderBookings();
}

// ── 行事曆 ────────────────────────────────────────
function getAllowedKeys(){
  const t=new Date(),k=[];
  for(let i=0;i<3;i++){const d=new Date(t.getFullYear(),t.getMonth()+i,1);k.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`)}
  return k;
}

function renderWdays(){
  document.getElementById('cal-wdays').innerHTML=WD.map((n,i)=>
    `<div class="cal-wday" style="${openDays.includes(i)?'color:#ffd700;font-weight:700':'opacity:.75'}">${n}</div>`
  ).join('');
}

function renderCal(){
  const y=viewDate.getFullYear(),mo=viewDate.getMonth();
  const mk=`${y}-${String(mo+1).padStart(2,'0')}`;
  const allowed=getAllowedKeys();
  document.getElementById('cal-title').textContent=`${y} 年 ${MONTH_NAMES[mo]}`;
  document.getElementById('cal-month').textContent=`${y}/${String(mo+1).padStart(2,'0')}`;
  document.getElementById('btn-prev').disabled=mk<=allowed[0];
  document.getElementById('btn-next').disabled=mk>=allowed[allowed.length-1];

  const today=new Date(),todayStr=fmtDate(today);
  const firstDow=new Date(y,mo,1).getDay();
  const lastDate=new Date(y,mo+1,0).getDate();
  const prevLast=new Date(y,mo,0).getDate();
  const myDates=(calData.myBookings||[]).map(b=>b.date);
  const limit=parseInt((calData.settings&&calData.settings.monthlyLimit)||1);
  const monthCount=(calData.myBookings||[]).filter(b=>b.date.startsWith(mk)).length;
  const hasMonthlyLimit=limit>0&&monthCount>=limit;

  let html='';
  // Prev month padding
  for(let i=firstDow-1;i>=0;i--)
    html+=`<div class="cal-day other"><div class="day-num">${prevLast-i}</div></div>`;

  for(let d=1;d<=lastDate;d++){
    const ds=`${y}-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(y,mo,d).getDay();
    const isPast=ds<todayStr;
    const isToday=ds===todayStr;
    const isOpen=openDays.includes(dow);
    const blk=(calData.blocked||[]).find(b=>b.date===ds);
    const taken=(calData.occupancy[ds]||[]).length;
    const rem=TIME_SLOTS.length-taken;
    const isMine=myDates.includes(ds);
    const inRange=allowed.includes(mk);
    const clickable=isOpen&&!isPast&&!blk&&inRange;

    let cls='cal-day';
    if(isOpen)cls+=' open-day';
    if(isToday)cls+=' today';
    if(isPast)cls+=' past';
    if(clickable)cls+=' clickable';

    let badge='';
    if(blk)badge=`<div class="badge blocked">⛔ ${blk.reason||'不開放'}</div>`;
    else if(isOpen&&!isPast){
      if(isMine)badge=`<div class="badge mine">🔵 已預約</div>`;
      else if(rem<=0)badge=`<div class="badge full">額滿</div>`;
      else if(hasMonthlyLimit)badge=`<div class="badge month-used">本月已達上限</div>`;
      else badge=`<div class="badge avail">剩 ${rem} 位</div>`;
    }

    const numHtml=isToday
      ?`<div class="day-num" style="background:var(--primary);color:white;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center">${d}</div>`
      :`<div class="day-num" style="${isOpen?'color:var(--primary);font-weight:600':''}">${d}</div>`;
    html+=`<div class="${cls}" ${clickable?`onclick="openSlots('${ds}')"`:''}>${numHtml}${badge}</div>`;
  }
  // Tail
  const cells=firstDow+lastDate;
  const tail=cells%7?7-cells%7:0;
  for(let i=1;i<=tail;i++)html+=`<div class="cal-day other"><div class="day-num">${i}</div></div>`;
  document.getElementById('cal-days').innerHTML=html;
  // Update legend hint
  const hintEl=document.getElementById('limit-hint');
  if(hintEl){
    const lbl=limit===0?'不限次數':`每月限 ${limit} 次`;
    hintEl.textContent=`可預約範圍：當月起 3 個月，${lbl}`;
  }
}

function prevMonth(){
  const a=getAllowedKeys(),cur=`${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}`;
  if(cur<=a[0])return;
  viewDate.setMonth(viewDate.getMonth()-1);renderCal();
}
function nextMonth(){
  const a=getAllowedKeys(),cur=`${viewDate.getFullYear()}-${String(viewDate.getMonth()+1).padStart(2,'0')}`;
  if(cur>=a[a.length-1])return;
  viewDate.setMonth(viewDate.getMonth()+1);renderCal();
}

// ── 時段選擇 ──────────────────────────────────────
function openSlots(ds){
  const mk=ds.slice(0,7);
  const limit=parseInt((calData.settings&&calData.settings.monthlyLimit)||1);
  const monthCount=(calData.myBookings||[]).filter(b=>b.date.startsWith(mk)).length;
  const hasMonth=limit>0&&monthCount>=limit;
  const taken=calData.occupancy[ds]||[];
  const mySlot=(calData.myBookings||[]).find(b=>b.date===ds);
  document.getElementById('slot-date-label').textContent=`${ds}（週${WD[parseLocalDate(ds).getDay()]}）`;
  const noticeEl=document.getElementById('slot-notice');
  if(hasMonth&&!mySlot){
    noticeEl.textContent=limit===0?'':'⚠️ 您本月已達預約上限（'+limit+' 次），如需更改請先取消現有預約。';
    noticeEl.style.display=(hasMonth&&!mySlot)?'block':'none';
  } else {
    noticeEl.style.display='none';
  }
  let html='';
  TIME_SLOTS.forEach(t=>{
    const isTaken=taken.includes(t);
    const isMine=mySlot&&cleanTime(mySlot.time)===t;
    if(isMine)html+=`<button class="slot mine-slot">🔵 ${t}<br><small>您的預約</small></button>`;
    else if(isTaken)html+=`<button class="slot taken">✗ ${t}</button>`;
    else if(hasMonth&&!mySlot)html+=`<button class="slot taken" style="text-decoration:none;color:var(--gray-300)">— ${t}</button>`;
    else html+=`<button class="slot" onclick="confirmBook('${ds}','${t}')">✅ ${t}</button>`;
  });
  document.getElementById('slots-grid').innerHTML=html;
  document.getElementById('slot-overlay').classList.add('open');
}

function confirmBook(date,time){
  closeOverlay('slot-overlay');
  showConfirm('確認預約',
    `確定要預約 <strong>${date}</strong> <strong>${time}</strong> 嗎？<br><small style="color:var(--gray-400)">每次30分鐘，同月每人限一個時段</small>`,
    [{label:'確認預約',cls:'btn-yes',action:()=>makeBook(date,time)},
     {label:'取消',cls:'btn-no',action:()=>{}}]);
}

async function makeBook(date,time){
  loading(true);
  try{
    const r=await api({action:'makeBooking',empId:emp.id,date,time});
    if(!r.ok){toast(r.error||'預約失敗',true);loading(false);return}
    toast('🎉 預約成功！確認信已寄出，行程已加入 Google 行事曆');
    await loadCalData();
  }catch(e){toast('連線失敗',true)}
  loading(false);
}

// ── 我的預約 ──────────────────────────────────────
function renderBookings(){
  const today=new Date();
  const bks=(calData.myBookings||[])
    .filter(b=>b.status!=='cancelled')
    .map(b=>({...b,date:cleanDate(b.date),time:cleanTime(b.time)}))
    .sort((a,b)=>a.date.localeCompare(b.date));
  const el=document.getElementById('bk-list');
  if(!bks.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📅</div><p>目前沒有預約紀錄<br>請至行事曆選擇時段</p></div>`;
    return;
  }
  el.innerHTML=bks.map(b=>{
    const d=parseLocalDate(b.date),isPast=d<today;
    return `<div class="bk-card">
      <div>
        <div class="bk-date">${b.date}（週${WD[d.getDay()]}）</div>
        <div class="bk-time">🕐 ${b.time} — ${addMins(b.time,30)}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="bk-status ${isPast?'past':'upcoming'}">${isPast?'已完成':'即將到來'}</span>
        ${!isPast?`<button class="btn-cancel" onclick="cancelBook('${b.id}')">取消預約</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function cancelBook(id){
  const b=(calData.myBookings||[]).find(x=>x.id===id);if(!b)return;
  showConfirm('取消預約',`確定要取消 <strong>${cleanDate(b.date)} ${cleanTime(b.time)}</strong> 的預約嗎？`,
    [{label:'確認取消',cls:'btn-red',action:async()=>{
      loading(true);
      const r=await api({action:'cancelBooking',bookingId:id,empId:emp.id});
      if(!r.ok){toast(r.error||'取消失敗',true);loading(false);return}
      toast('已取消預約');
      await loadCalData();renderBookings();loading(false);
    }},{label:'保留',cls:'btn-no',action:()=>{}}]);
}

// ── 更改密碼 ──────────────────────────────────────
async function changePw(){
  const cur=document.getElementById('pw-cur').value;
  const nw=document.getElementById('pw-new').value;
  const cf=document.getElementById('pw-cf').value;
  const err=document.getElementById('pw-err');const suc=document.getElementById('pw-suc');
  err.classList.remove('show');suc.classList.remove('show');
  if(nw.length<6){err.textContent='新密碼至少6碼';err.classList.add('show');return}
  if(nw!==cf){err.textContent='兩次密碼不一致';err.classList.add('show');return}
  loading(true);
  const r=await api({action:'changeEmpPw',id:emp.id,currentPw:cur,newPw:nw});
  loading(false);
  if(!r.ok){err.textContent=r.error||'更改失敗';err.classList.add('show');return}
  suc.classList.add('show');
  ['pw-cur','pw-new','pw-cf'].forEach(id=>document.getElementById(id).value='');
}

// ── 關閉 overlay 點背景 ───────────────────────────
document.querySelectorAll('.overlay').forEach(o=>o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('open')}));

init();
</script>
