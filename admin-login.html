<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理後台登入 — 視障按摩預約系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1c2833,#2c3e50,#1a252f)}
:root{--primary:#2c3e50;--primary-light:#34495e;--gray-200:#e2e5e9;--gray-400:#9aa3ae;--gray-600:#4a5568;--danger:#c0392b;--danger-pale:#fadbd8;--radius:10px;--radius-lg:16px}
.card{background:white;border-radius:var(--radius-lg);padding:48px 40px;width:420px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{width:68px;height:68px;background:var(--primary);border-radius:20px;display:inline-flex;align-items:center;justify-content:center;font-size:30px;margin-bottom:14px}
.logo h1{font-size:22px;font-weight:600;color:var(--primary)}
.logo p{font-size:13px;color:var(--gray-400);margin-top:5px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:500;color:var(--gray-600);margin-bottom:8px}
.form-group input{width:100%;padding:13px 16px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:15px;font-family:inherit;outline:none;color:#1a202c;transition:border-color .2s}
.form-group input:focus{border-color:var(--primary)}
.btn{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:var(--radius);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-top:8px;transition:background .2s}
.btn:hover{background:var(--primary-light)}
.err{background:var(--danger-pale);color:var(--danger);padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-top:12px;display:none}
.err.show{display:block}
.loading{text-align:center;padding:12px;color:var(--gray-400);font-size:13px;display:none}
.loading.show{display:block}
.switch{text-align:center;margin-top:22px;font-size:13px;color:var(--gray-400)}
.switch a{color:#2980b9;cursor:pointer;font-weight:500;text-decoration:none}
.switch a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⚙️</div>
    <h1>管理後台</h1>
    <p>視障按摩預約系統 — 管理者專用</p>
  </div>
  <div class="form-group">
    <label>管理者帳號</label>
    <input type="text" id="admin-id" placeholder="admin" autocomplete="username">
  </div>
  <div class="form-group">
    <label>密碼</label>
    <input type="password" id="admin-pw" placeholder="請輸入管理者密碼" autocomplete="current-password">
  </div>
  <button class="btn" onclick="adminLogin()">登入管理後台</button>
  <div class="loading" id="loading">登入中，請稍候…</div>
  <div class="err" id="err"></div>
  <div class="switch"><a href="index.html">← 員工登入</a></div>
</div>
<script>
const API_KEY='mas_api_url';
function getAPI(){return 'https://script.google.com/macros/s/AKfycbwSAwiDZ7uxfgF4WXen-ygBe-QKbisbfVgrmVF6aOUgnz7-8IfY1EpZTzI3o8efv-SsIw/exec';}

async function adminLogin(){
  const id=String(document.getElementById('admin-id').value).trim();
  const pw=String(document.getElementById('admin-pw').value);
  const err=document.getElementById('err');
  const loading=document.getElementById('loading');
  err.classList.remove('show');
  if(!id||!pw){err.textContent='請填寫帳號與密碼';err.classList.add('show');return}
  loading.classList.add('show');
  try{
    const url=getAPI();
    if(!url){err.textContent='尚未設定 API 網址，請先至員工登入頁面設定';err.classList.add('show');loading.classList.remove('show');return}
    const r=await fetch(url,{method:'POST',redirect:'follow',body:JSON.stringify({action:'loginAdmin',id,password:pw})});
    const data=await r.json();
    loading.classList.remove('show');
    if(!data.ok){err.textContent=data.error||'帳號或密碼錯誤';err.classList.add('show');return}
    if(data.admin) data.admin.id = String(data.admin.id);
    sessionStorage.setItem('admin',JSON.stringify(data.admin));
    location.href='admin.html';
  }catch(e){
    loading.classList.remove('show');
    err.textContent='連線失敗，請確認 API 設定';err.classList.add('show');
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin()});
</script>
</body>
</html>
